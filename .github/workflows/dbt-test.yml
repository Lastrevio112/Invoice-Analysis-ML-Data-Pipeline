# CI/CD pipeline
# Run dbt test whenever there is any code change in the dbt/ subfolder.

name: dbt Test

on:
  push:
    branches:
      - main
    paths:
      - 'dbt/**'
  pull_request:
    branches:
      - main
    paths:
      - 'dbt/**'
  workflow_dispatch:

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP service account key
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > ${{ github.workspace }}/.gcp-service-account.json
          echo "GCP_KEYFILE_PATH=${{ github.workspace }}/.gcp-service-account.json" >> $GITHUB_ENV

      - name: dbt deps
        working-directory: dbt
        run: dbt deps
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt

      - name: dbt test
        working-directory: dbt
        run: dbt test
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt